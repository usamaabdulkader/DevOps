<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png"
    href="https://img.icons8.com/external-those-icons-flat-those-icons/24/external-Docker-Logo-social-media-those-icons-flat-those-icons.png">
  <title>Dockyard</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

  <!-- ── TOPBAR ──────────────────────────────────────────── -->
<header class="topbar">
  <div class="brand">
    <img width="24" height="24"
      src="https://img.icons8.com/external-those-icons-flat-those-icons/24/external-Docker-Logo-social-media-those-icons-flat-those-icons.png"
      alt="Docker">
    Dockyard
    <span class="brand-sep">|</span>
    <span class="brand-sub">Docker Analyser</span>
  </div>
  <div class="topbar-right">
    <div class="t-pill">
      <span class="live-dot"></span>
      <span id="vc">0</span> visits
    </div>
    <button class="t-btn" id="theme-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
      Light
    </button>
  </div>
</header>

  <!-- ── APP SHELL ────────────────────────────────────────── -->
  <div class="shell">

    <!-- ── SIDEBAR ──────────────────────────────────────── -->
    <nav class="sidebar expanded" id="sidebar">
      <button class="sb-toggle" id="sb-toggle" aria-label="Toggle sidebar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>

      <div class="sb-section">
        <div class="sb-label">Tools</div>
        <div id="tool-nav"></div>
      </div>
    </nav>

    <!-- ── MAIN CONTENT ──────────────────────────────────── -->
    <main class="content">

      <!-- ── TOOL PANEL (left/centre) ──────────────────── -->
      <div class="rpanel">
        <div class="rp-tabs">
          <button class="rp-tab active" data-tab="run">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5,3 19,12 5,21" />
            </svg>
            Analyse
          </button>
          <button class="rp-tab" data-tab="result">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            Report
          </button>
        </div>

        <!-- Analyse tab -->
        <div class="tab-pane active" id="tab-run">
          <div class="run-pane">
            <div>
              <span class="field-lbl">Tool</span>
              <div class="tool-sel" id="tool-sel">— select a tool —</div>
            </div>
            <div id="tool-instructions" class="tool-hint" style="display:none"></div>
            <div>
              <span class="field-lbl">Config Input</span>
              <textarea id="payload" placeholder="Paste your Dockerfile or Compose config…"
                spellcheck="false"></textarea>
              <div class="pa-row">
                <button class="ex-btn" id="ex-btn">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                  </svg>
                  Load example config
                </button>
                <span class="cc" id="cc">0 chars</span>
              </div>
            </div>
            <button class="run-btn" id="run-btn" disabled>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5,3 19,12 5,21" />
              </svg>
              Run Analysis
            </button>
          </div>
        </div>

        <!-- Report tab -->
        <div class="tab-pane" id="tab-result">
          <div class="res-pane" id="res-pane">
            <div class="res-empty">
              <svg class="res-empty-ico" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
              <div class="res-empty-txt">Select a scan from the feed to view its report.</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── ANALYSIS FEED (right) ──────────────────────── -->
      <div class="feed-wrap">
        <div class="feed-head">
          <div class="feed-title">
            Analysis Feed
            <span class="feed-ct" id="feed-ct">0 scans</span>
          </div>
          <div class="feed-acts">
            <button class="act" id="refresh-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10" />
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
              </svg>
              Refresh
            </button>
            <button class="act del" id="clear-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <path d="M10 11v6M14 11v6" />
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
              </svg>
              Clear
            </button>
          </div>
        </div>
        <div class="feed" id="feed">
          <div class="empty">
            <svg class="empty-ico" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
              <line x1="12" y1="22.08" x2="12" y2="12" />
            </svg>
            <div class="empty-ttl">No analyses yet</div>
            <div class="empty-sub">Select a tool, paste your config<br>and hit Run Analysis.</div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <div class="statusbar">
    <div class="sb-left">
      <div class="sb-engine">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
        </svg>
        Engine running
      </div>
    </div>
    <div class="sb-right">
      <span class="sb-version">v1.0.0</span>
    </div>
  </div>

  <!-- ── TOAST ─────────────────────────────────────────────── -->
  <div class="toast" id="toast">
    <span id="t-icon"></span>
    <div>
      <div class="toast-msg" id="t-msg"></div>
      <div class="toast-sub" id="t-sub"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>

</html>
