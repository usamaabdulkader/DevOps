services:

  web:
    build: ./app
    command: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 app:app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=docker-toolkit-secret
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  scanner:
    build: ./app
    command: ["python", "scanner.py"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net
    volumes: # Mount Docker socket so the scanner can run `docker compose config`
      - /var/run/docker.sock:/var/run/docker.sock:ro
    stop_grace_period: 15s   # ← give SIGTERM handler time to run before SIGKILL

  redis:
    build: ./redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-net

volumes:
  redis-data:

networks:
  app-net:
    driver: bridge
